<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindMyBook — Login / Signup</title>

<link rel="stylesheet" href="css/style.css" />

<style>
/* Centered Auth Section */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url('images/library.jpg') center/cover no-repeat;
}
#authSection {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(246,243,239,0.95); 
    display:flex; align-items:center; justify-content:center;
}

.auth-box {
    background:white; padding:30px; border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:300px; text-align:center;
}

.auth-box h2 {
    margin-bottom:20px; color:#8b5e3c;
}

.auth-box input {
    display:block; width:100%; margin:10px 0; padding:10px; border-radius:10px;
    border:1px solid #ccc; box-sizing:border-box;
}

.auth-box button {
    margin-top:15px; padding:12px; width:100%; border:none;
    background:#8b5e3c; color:white; border-radius:10px; cursor:pointer;
}

.auth-box p {
    margin-top:15px; font-size:14px;
}

.auth-box p span {
    color:blue; cursor:pointer;
}
</style>
</head>
<body>

<div id="authSection">

    <!-- LOGIN -->
    <div id="loginBox" class="auth-box">
        <h2>Login</h2>
        <input id="loginUser" placeholder="Username">
        <input id="loginPass" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p>New user? <span id="showSignup">Sign Up</span></p>
    </div>

    <!-- SIGNUP -->
    <div id="signupBox" class="auth-box" style="display:none;">
        <h2>Sign Up</h2>
        <input id="signupUser" placeholder="Username">
        <input id="signupPass" type="password" placeholder="Password">
        <input id="signupContact" placeholder="Email or Mobile">
        <button id="signupBtn">Create Account</button>
        <p>Already have an account? <span id="showLogin">Login</span></p>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    let users = JSON.parse(localStorage.getItem("users")) || [];

    const loginBox = document.getElementById("loginBox");
    const signupBox = document.getElementById("signupBox");

    // Show signup form
    document.getElementById("showSignup").addEventListener("click", () => {
        loginBox.style.display = "none";
        signupBox.style.display = "block";
    });

    // Show login form
    document.getElementById("showLogin").addEventListener("click", () => {
        signupBox.style.display = "none";
        loginBox.style.display = "block";
    });

    // Signup button
    document.getElementById("signupBtn").addEventListener("click", () => {
        const u = document.getElementById('signupUser').value.trim();
        const p = document.getElementById('signupPass').value.trim();
        const c = document.getElementById('signupContact').value.trim();

        if (!u || !p || !c) { alert("Please fill all fields!"); return; }

        if(users.find(x => x.username === u)){
            alert("User already exists!");
            return;
        }

        users.push({username:u, password:p, contact:c});
        localStorage.setItem("users", JSON.stringify(users));
        alert("Signup successful! Redirecting...");

        window.location.href = "main.html?user=" + encodeURIComponent(u);
    });

    // Login button
    document.getElementById("loginBtn").addEventListener("click", () => {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value.trim();

        const found = users.find(x => x.username === u && x.password === p);
        if(!found){ alert("Invalid username or password!"); return; }

        window.location.href = "main.html?user=" + encodeURIComponent(u);
    });
});
</script>

</body>
</html>
